name: CI

# Run on every PR to main, and on direct pushes to main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend: lint + tests ──────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          cd backend
          ruff check .

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v
        env:
          # Minimal env for tests — no real Supabase connection needed
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"

  # ── Frontend: lint + build ─────────────────────────────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build (TypeScript check + Vite bundle)
        run: |
          cd frontend
          npm run build
